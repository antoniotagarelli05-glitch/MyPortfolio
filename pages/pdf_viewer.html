<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzatore PDF</title>
    <style>        svg { display: inline; vertical-align: middle; }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121821;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #viewer {
            width: 100%;
            height: 100%;
            border: none;
        }

        .notice {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            color: #ffffff;
            background: #121821;
        }

        .notice h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .notice p {
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <iframe id="viewer" title="Visualizzatore PDF"></iframe>
    <div id="emptyNotice" class="notice hidden" style="display:none;">
        <div>
            <h1>File non trovato</h1>
            <p>Controlla che il parametro <code>file</code> sia presente nell'URL.</p>
        </div>
    </div>
    <script>
        function getParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || '';
        }

        function encodeAscii(url) {
            return url.replace(/ /g, '%20');
        }

        const file = getParam('file');
        const viewer = document.getElementById('viewer');
        const notice = document.getElementById('emptyNotice');

        if (file) {
            viewer.src = encodeAscii(file) + '#toolbar=0&navpanes=0&scrollbar=0';
        } else {
            notice.style.display = 'flex';
        }

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', event => {
            const key = event.key.toLowerCase();
            if ((event.ctrlKey || event.metaKey) && ['s', 'p', 'u'].includes(key)) {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
